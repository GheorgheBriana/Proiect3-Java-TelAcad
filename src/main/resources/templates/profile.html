<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Profile</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700"/>
  <link rel="stylesheet" th:href="@{/font-awesome-4.7.0/css/font-awesome.min.css}"/>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}"/>
  <link rel="stylesheet" type="text/css" th:href="@{/slick/slick.css}"/>
  <link rel="stylesheet" type="text/css" th:href="@{/slick/slick-theme.css}"/>
  <link rel="stylesheet" type="text/css" th:href="@{/css/datepicker.css}"/>
  <link rel="stylesheet" th:href="@{/css/tooplate-style.css}"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>
<div class="tm-main-content" id="top">
  <div class="tm-top-bar-bg"></div>
  <div class="tm-top-bar" id="tm-top-bar">
    <div class="container">
      <div class="row">
        <nav class="navbar navbar-expand-lg narbar-light">
          <a class="navbar-brand mr-auto" th:href="@{/}">
            <img src="img/logo.png" alt="Site logo">
            Level
          </a>

          <button type="button" id="nav-toggle" class="navbar-toggler collapsed"
                  data-toggle="collapse" data-target="#mainNav"
                  aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div id="mainNav" class="collapse navbar-collapse tm-bg-white">
            <ul class="navbar-nav ml-auto">
              <li class="nav-item">
                <a class="nav-link" th:href="@{/}">Home</a>
              </li>
              <li class="nav-item active">
                <a class="nav-link" th:href="@{/profile}">Profile</a>
              </li>

              <li class="nav-item" th:if="${session.currentUserID != null}">
                <span class="nav-link" style="white-space: nowrap;">
                  <span th:text="'Logged in as: ' + ${session.currentUsername}"></span>
                  &nbsp;|&nbsp;
                  <form th:action="@{/logout}" method="get" style="display:inline; margin:0;">
                    <button type="submit"
                            style="background:none;border:none;padding:0;color:inherit;cursor:pointer;text-decoration:underline;">
                      Press to Logout
                    </button>
                  </form>
                </span>
              </li>
            </ul>
          </div>
        </nav>
      </div>
    </div>
  </div>

  <div class="tm-section tm-bg-img" id="tm-section-1">
    <div class="tm-bg-white ie-container-width-fix-2">
      <div class="container ie-h-align-center-fix">
        <div class="row">
          <div class="col-xs-12 ml-auto mr-auto ie-container-width-fix">
            <div class="tm-search-form tm-section-pad-2">
              <div class="form-row tm-search-form-row">
                <div class="container">
                  <h2 style="margin-bottom: 25px;">My Profile</h2>

                  <div style="margin-bottom: 20px;">
                    <p>
                      <strong>User ID:</strong>
                      <span th:text="${userId}">1</span>
                    </p>
                    <p>
                      <strong>Username:</strong>
                      <span th:text="${username}">username</span>
                    </p>
                  </div>

                  <div style="margin-bottom: 25px;">
                    <p>
                      <strong>Total reservations:</strong>
                      <span th:text="${reservationCount}">0</span>
                    </p>
                  </div>

                  <div style="margin-top: 30px;">
                    <h3>My Reservations</h3>

                    <div th:if="${reservationCount == 0}">
                      <p>You have no reservations yet.</p>
                    </div>

                    <table th:if="${reservationCount > 0}" class="table table-bordered">
                      <thead>
                      <tr>
                        <th>Flight ID</th>
                        <th>Adults</th>
                        <th>Children</th>
                      </tr>
                      </thead>
                      <tbody>
                      <tr th:each="reservation : ${reservations}">
                        <td th:text="${reservation.idZbor}">1</td>
                        <td th:text="${reservation.numberOfAdults}">0</td>
                        <td th:text="${reservation.numberOfChildrens}">0</td>
                      </tr>
                      </tbody>
                    </table>
                  </div>

                  <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <a th:href="@{/}" class="btn btn-primary tm-btn-search">Back to Home</a>
                    <a th:href="@{/logout}" class="btn btn-primary tm-btn-search">Logout</a>
                    <form th:action="@{/deleteAccount}" method="post" style="margin-top: 15px;"
                          onsubmit="return confirm('Are you sure you want to delete your account?');">
                      <button type="submit" class="btn btn-danger">Delete Account</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/jquery-1.11.3.min.js}"></script>
<script th:src="@{/js/popper.min.js}"></script>
<script th:src="@{/js/bootstrap.min.js}"></script>
<script th:src="@{/js/datepicker.min.js}"></script>
<script th:src="@{/js/jquery.singlePageNav.min.js}"></script>
<script th:src="@{/slick/slick.min.js}"></script>
</body>
</html>
